server {
    listen 80;
    server_name live.architeksoft.com;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name live.architeksoft.com;

    ssl_certificate /etc/letsencrypt/live/live.architeksoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.architeksoft.com/privkey.pem;

    # Basic SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:3000;
        
        # --- WEBSOCKET FIX START ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # --- WEBSOCKET FIX END ---

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional: Prevents Nginx from closing the socket too early
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
