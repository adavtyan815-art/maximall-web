server {
    listen 80 default_server;
    server_name _;

    # Allow EC2 instances to report their tunnel URL over raw HTTP (without SSL)
    location ~ ^/api/instances/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://18-185-5-251.nip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 18-185-5-251.nip.io;

    ssl_certificate /etc/letsencrypt/live/18-185-5-251.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/18-185-5-251.nip.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
