services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pixel-connector
    restart: unless-stopped
    # REMOVED "80:3000" - we don't want the app exposed directly to the web
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - ./public:/app/public:ro

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
