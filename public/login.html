<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ArchiTek Soft</title>
  <link rel="icon" href="assets/images/favicon-black.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      margin-bottom: 1.5rem;
      color: #334155;
      text-align: center;
    }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #64748b; font-size: 0.9rem; }
    input {
      width: 100%; padding: 0.75rem; border-radius: 0.5rem;
      border: 1px solid #cbd5e1; box-sizing: border-box; font-family: inherit;
    }
    button {
      width: 100%; padding: 0.75rem; background: #57A6FA; color: white;
      border: none; border-radius: 0.5rem; cursor: pointer; margin-top: 1rem;
      font-weight: 600; font-size: 1rem; font-family: inherit;
    }
    button:hover { background: #3b8fd9; }
    .error { color: #ef4444; text-align: center; margin-top: 1rem; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="text-align: center; margin-bottom: 1.5rem;">
      <img src="assets/images/image05.png" alt="Logo" style="max-height: 45px;">
    </div>
    <h2>Admin Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Log In</button>
      <div id="errorMsg" class="error">Invalid credentials</div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/admin.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
